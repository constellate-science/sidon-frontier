name: Auto-merge a gate-clean machine-verified beat

# A producer's PR that adds a frozen-verified beat merges itself, with no
# maintainer in the loop. The whole decision is one verb: `vela ci verdict`
# re-derives the exact-lane verdict from a clean checkout — every new finding is
# `machine_verified`, at least one genuinely beats the accepted record, and the
# PR only touched the append-only store — and exits 0 only when the PR may
# auto-merge. `machine_verified` is distinct from human `accepted`; this never
# signs.
#
# SECURITY. Runs on `pull_request_target`, so GitHub uses THIS base-branch
# workflow (a fork cannot alter what runs) with a repo-scoped write token. The
# fork head is checked out as DATA ONLY — the only programs that run are the
# base-trusted `vela` binary and `gh`. `vela ci verdict` reads the accepted
# record and the pinned verifier from the BASE ref, so a fork cannot forge a beat.
on:
  pull_request_target:
    paths:
      - ".vela/**"
      - "witnesses/**"
      - "frontier.json"
      - "vela.lock"
      - "bounds.json"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: constellate-science/vela@main
        with:
          strict: "false"
      - name: Decide + merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          BASE: ${{ github.base_ref }}
        run: |
          set -uo pipefail
          git fetch --quiet origin "$BASE"
          ok=1
          vela check . >/dev/null 2>&1 || ok=0
          vela reproduce . >/dev/null 2>&1 || ok=0
          vela ci verdict --frontier . --base "origin/$BASE" --json > verdict.json 2>&1 || ok=0
          cat verdict.json
          if [ "$ok" = 1 ]; then
            gh pr merge "$PR" --squash --auto
            gh pr comment "$PR" --body "Auto-merged: a frozen-verified beat (\`machine_verified\`). A maintainer marks significance for \`accepted\`."
          else
            gh pr edit "$PR" --add-label needs-review || true
            reasons="$(jq -r '.reasons[]?' verdict.json 2>/dev/null | sed 's/^/- /')"
            gh pr comment "$PR" --body "$(printf 'Not auto-merged — held for a human review.\n\n%s' "${reasons:-- the floor (check/reproduce) or the exact-lane verdict did not pass}")"
          fi
